<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>চাকরির প্রস্তুতি - অনলাইন পোর্টাল</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 50px; }
        
        /* 🔝 টপ বার এবং সিক্রেট লগইন */
        header { background-color: #1a237e; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { font-size: 22px; }
        .login-trigger { background-color: transparent; color: #e8eaf6; border: 1px solid #c5cae9; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.3s; text-decoration: none; font-weight: bold; }
        .login-trigger:hover { background-color: #3f51b5; color: white; border-color: #3f51b5; }

        /* 📐 ৩ কলাম লেআউট */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .column { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #3f51b5; }
        .column-title { color: #1a237e; font-size: 20px; margin-bottom: 15px; border-bottom: 2px solid #e0e0e0; padding-bottom: 8px; text-align: center; }
        
        /* 📝 প্রশ্ন ও উত্তর স্টাইল */
        .q-box { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed #e0e0e0; text-align: left; }
        .question { font-weight: 600; color: #2c3e50; margin-bottom: 4px; line-height: 1.5; }
        .answer { color: #27ae60; font-weight: 500; font-size: 15px; }
        
        /* 📑 রিড মোর বাটন ও অতিরিক্ত অংশ */
        .read-more-btn { display: block; width: 100%; text-align: center; background-color: #f5f5f5; color: #3f51b5; padding: 10px; border: 1px solid #dcdcdc; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        .read-more-btn:hover { background-color: #3f51b5; color: white; }
        .more-questions { display: none; margin-top: 15px; }

        /* 🔒 গোপন লগইন মডাল/পপআপ */
        .login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 360px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); position: relative; text-align: center; }
        .login-box h3 { margin-bottom: 20px; color: #1a237e; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #999; }
        .close-btn:hover { color: #333; }
        
        /* 🛡️ ব্রাউজার পাসওয়ার্ড সেভ ব্লকিং ইনপুট */
        .login-box input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; letter-spacing: 3px; }
        .login-box button { width: 100%; padding: 12px; background-color: #1a237e; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .login-box button:hover { background-color: #3f51b5; }
    </style>
</head>
<body>

    <!-- 🔝 টপ বার -->

        <h1>সরকারি চাকরির প্রস্তুতি - অনলাইন পোর্টাল</h1>
        <button class="login-trigger" onclick="openLoginModal()">এক্সাম দিন</button>
    </header>

            <div id="english-short"></div>
            <button class="read-more-btn" onclick="toggleReadMore('english')">Read More (আরও প্রশ্ন দেখুন)</button>

        </div>

    <!-- 🔒 সিক্রেট লগইন পপআপ উইন্ডো -->

            <button onclick="window.loginWithKey()">প্রবেশ করুন</button>
        </div>
    </div>

            document.getElementById('loginModal').style.display = 'none';

                btn.innerText = "Read More (আরও প্রশ্ন দেখুন)";

        // প্রশ্ন রেন্ডার করার মেকানিজম
        function displayQuestions(subject, shortId, moreId) {
            const shortBox = document.getElementById(shortId);
            const moreBox = document.getElementById(moreId);
            const list = questionData[subject];
            
            list.forEach((item, index) => {
                let html = `
                    <div class="q-box">
                        <div class="question">প্রশ্ন ${index + 1}: ${item.q}</div>
                        <div class="answer">উত্তর: ${item.a}</div>
                    </div>
                `;
                if (index < 10) {
                    shortBox.innerHTML += html;
                } else {
                    moreBox.innerHTML += html;
                }
            });
        }

        window.onload = function() {
            displayQuestions('english', 'english-short', 'english-more');
            displayQuestions('math', 'math-short', 'math-more');
            displayQuestions('gk', 'gk-short', 'gk-more');
        };
