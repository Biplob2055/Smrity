<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Exam Preparation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">

  <div class="chat-header-wa">
    <div class="header-left">
      <button onclick="logout()" class="back-btn-wa">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      </button>
      <div class="avatar-wa">M</div>
      <div class="user-info-wa">
        <h3 id="chatWithTitle">Loading...</h3>
        <span id="status" class="status-wa">offline</span>
      </div>
    </div>
    <div class="header-right-wa">
      <button onclick="clearAllMessages()" class="btn-clear-wa">Clear All</button>
      <button class="menu-dots-wa">⋮</button>
    </div>
  </div>

  <div id="messages" class="message-area-wa">
    <div class="date-divider-wa"><span>Today</span></div>
    <div id="actualMessages" class="actual-msg-wrapper-wa"></div>
  </div>

  <div id="typing" class="action-indicator-wa"></div>

  <div class="bottom-input-bar-wa">
    <div class="wa-input-wrapper">
      <button class="wa-icon-btn" onclick="toggleEmojiMenu()">😊</button>
      <input id="messageInput" placeholder="Message..." oninput="emitTyping()" onkeypress="if(event.key === 'Enter') sendMessage()">
      <button class="wa-icon-btn">📎</button>
    </div>
    
    <button class="send-btn-wa" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>

    <div id="emojiMenu" class="emoji-popup-wa">
      <span onclick="appendEmoji('👍')">👍</span>
      <span onclick="appendEmoji('❤️')">❤️</span>
      <span onclick="appendEmoji('😂')">😂</span>
      <span onclick="appendEmoji('😮')">😮</span>
      <span onclick="appendEmoji('😢')">😢</span>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
