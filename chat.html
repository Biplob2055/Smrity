<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smrity Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">

  <div class="chat-header">
    <div class="user-info">
      <div class="avatar">💬</div>
      <div>
        <div id="chatWithTitle">Smrity Chat</div>
        <div id="status" class="status-offline">Offline</div>
      </div>
    </div>
    <div class="header-buttons">
      <button onclick="clearAllMessages()" class="btn-clear" style="background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #ef4444; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 8px; font-size: 13px;">Clear Chat</button>
      <button onclick="logout()" class="btn-logout">Exit</button>
    </div>
  </div>

  <div id="messages" class="message-area"></div>

  <div id="typing" class="action-indicator"></div>

  <div class="bottom-input-bar">
    <button class="icon-btn" onclick="toggleEmojiMenu()">😀</button>
    
    <input id="messageInput" placeholder="মেসেজ লিখুন..." oninput="emitTyping()">
    
    <button class="btn-send" onclick="sendMessage()">➤</button>
    <button class="btn-voice" onclick="startRecording()">🎤</button>
    
    <div id="emojiMenu" class="emoji-popup">
      <span onclick="appendEmoji('👍')">👍</span>
      <span onclick="appendEmoji('❤️')">❤️</span>
      <span onclick="appendEmoji('😂')">😂</span>
      <span onclick="appendEmoji('😮')">😮</span>
      <span onclick="appendEmoji('😢')">😢</span>
      <span onclick="appendEmoji('🙏')">🙏</span>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
