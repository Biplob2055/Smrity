<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Smrity Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="chat-body">

  <div class="chat-header">
    <div class="header-left">
      <button onclick="logout()" class="back-btn">←</button>
      <div class="avatar">S</div>
      <div class="user-details">
        <div id="chatWithTitle">Samale Torres</div>
        <div id="status" class="status-text">Offline</div>
      </div>
    </div>
    <div class="header-right">
      <button onclick="clearAllMessages()" class="btn-clear-chat">Clear</button>
    </div>
  </div>

  <div id="messages" class="message-area"></div>

  <div id="typing" class="action-indicator"></div>

  <div class="bottom-input-bar">
    <div class="input-container-box">
      <button class="input-icon-btn" onclick="toggleEmojiMenu()">😊</button>
      <input id="messageInput" placeholder="Type a message..." oninput="emitTyping()">
      <button class="input-icon-btn" onclick="startRecording()">📎</button>
    </div>
    <button class="btn-send-modern" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>

    <div id="emojiMenu" class="emoji-popup">
      <span onclick="appendEmoji('👍')">👍</span>
      <span onclick="appendEmoji('❤️')">❤️</span>
      <span onclick="appendEmoji('😂')">😂</span>
      <span onclick="appendEmoji('😮')">😮</span>
      <span onclick="appendEmoji('😢')">😢</span>
      <span onclick="appendEmoji('🙏')">🙏</span>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
