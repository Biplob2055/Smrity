<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0b141a; /* আপনার স্ক্রিনশটের ডার্ক ব্যাকগ্রাউন্ড */
            color: #fff;
        }

        /* মূল কন্টেইনার যা পুরো স্ক্রিন জুড়ে থাকবে এবং কিবোর্ড আসলে সংকুচিত হবে */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* ডাইনামিক হাইট যা কিবোর্ডকে হ্যান্ডেল করবে */
        }

        /* চ্যাট মেসেজ দেখানোর জায়গা */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* নিচের চ্যাট ইনপুট এরিয়া (Gemini স্টাইল) */
        .chat-input-holder {
            padding: 12px 16px;
            background-color: #0b141a; /* ব্যাকগ্রাউন্ডের সাথে মিলানো */
        }

        /* ইনপুট বক্সের ভেতরের সাদা/হালকা ডার্ক রাউন্ডেড বক্সটি */
        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: #1f2c34; /* ইনপুট বক্সের ব্যাকগ্রাউন্ড */
            border-radius: 24px; /* Gemini-র মতো গোল শেপ */
            padding: 6px 14px;
            border: 1px solid #374248;
            max-width: 100%;
        }

        /* টেক্সট লেখার মূল ইনপুট */
        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 16px; /* ১৬ পিক্সেল দিলে আইফোনে অটো-জুম হবে না */
            padding: 12px 8px; /* লেখার জায়গাটি বড় দেখাবে */
            min-width: 0; /* ফ্লেক্স বক্সের ভেতরে স্ক্রিন ফাটবে না */
        }

        .input-wrapper input::placeholder {
            color: #8696a0;
        }

        /* সেন্ড এবং অন্যান্য বাটন এরিয়া */
        .input-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 8px;
        }

        .chat-btn {
            background: none;
            border: none;
            color: #00a884; /* বাটনের রং */
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-messages">
            </div>

        <div class="chat-input-holder">
            <div class="input-wrapper">
                <input type="text" placeholder="Ask anything..." id="messageInput">
                <div class="input-buttons">
                    <button class="chat-btn" id="sendBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
